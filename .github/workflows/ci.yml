name: CI
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Typecheck
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc -p tsconfig.prod.json --noEmit

      - name: Install mkcert deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3-tools ca-certificates curl

      - name: Install mkcert
        run: |
          set -e
          curl -JLO "https://dl.filippo.io/mkcert/latest?for=linux/amd64"
          chmod +x mkcert-v*-linux-amd64
          sudo mv mkcert-v*-linux-amd64 /usr/local/bin/mkcert
          mkcert -version

      - name: Test
        run: npm test

      - name: Verify Build
        run: npm run build